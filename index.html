<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anchor</title>
<meta name="description" content="Anchor: accountability for your phone. On Google Play now, coming soon to iPhone.">
<meta property="og:title" content="Anchor">
<meta property="og:description" content="Accountability for your phone.">
<meta property="og:url" content="https://anchorph.one">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600&family=Spline+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0B10;
    --ink:#EDEFF7; --muted:#9098B4; --faint:#5B6178;
    --accent:#7C8FE8; --line:#23273A;
    --font-d:"Bricolage Grotesque",system-ui,sans-serif;
    --font-b:"Spline Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);font-family:var(--font-b);
       min-height:100svh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
       background:radial-gradient(115% 75% at 50% -8%,rgba(124,143,232,.12),transparent 58%),var(--bg)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
       text-align:center;padding:clamp(28px,6vw,64px) 22px}
  .stage{display:flex;flex-direction:column;align-items:center;max-width:520px}
  .eyebrow{font-size:.72rem;font-weight:500;letter-spacing:.24em;text-transform:uppercase;
           color:var(--faint);margin:0 0 26px}
  .wordmark{height:clamp(38px,7vw,58px);display:block}
  h1{font-family:var(--font-d);font-weight:600;font-size:clamp(1.6rem,3.6vw,2.35rem);
     letter-spacing:-.02em;line-height:1.12;margin:clamp(26px,4vw,38px) 0 0;text-wrap:balance}
  .sub{color:var(--muted);font-size:clamp(.98rem,1.9vw,1.08rem);line-height:1.55;
       margin:16px 0 0;max-width:40ch}
  .btn{display:inline-flex;align-items:center;gap:10px;margin-top:clamp(30px,5vw,40px);
       border:1px solid var(--line);border-radius:13px;padding:13px 22px;
       background:rgba(255,255,255,.03);color:var(--ink);
       font-weight:500;font-size:.98rem;text-decoration:none;
       transition:border-color .2s,background .2s,transform .2s}
  .btn:hover{border-color:var(--accent);background:rgba(124,143,232,.08);transform:translateY(-1px)}
  .btn svg{width:16px;height:16px;fill:var(--accent);flex:none}
  .soon{margin:18px 0 0;font-size:.82rem;letter-spacing:.02em;color:var(--faint)}
  footer{padding:22px;color:var(--faint);font-size:.8rem;display:flex;gap:16px;
         justify-content:center;flex-wrap:wrap}
  footer a{color:var(--faint);text-decoration:none;transition:color .2s}
  footer a:hover{color:var(--muted)}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .stage>*{animation:up .7s cubic-bezier(.16,1,.3,1) both}
  .stage>*:nth-child(2){animation-delay:.07s}
  .stage>*:nth-child(3){animation-delay:.14s}
  .stage>*:nth-child(4){animation-delay:.21s}
  .stage>*:nth-child(5){animation-delay:.28s}
  @media (prefers-reduced-motion:reduce){.stage>*{animation:none}}
</style>
</head>
<body>

<main>
  <div class="stage">
    <img class="wordmark" src="assets/wordmark.png" alt="Anchor">
    <h1>Accountability for your phone.</h1>
    <p class="sub">Block the apps that pull you in. Unlocking one takes your partner's approval, not your willpower.</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.anchorapp.focus">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3.3c0-.85.92-1.38 1.65-.95l14.5 8.7c.72.43.72 1.47 0 1.9l-14.5 8.7c-.73.43-1.65-.1-1.65-.95V3.3Z"/></svg>
      Get it on Google Play
    </a>
    <p class="soon">iPhone coming soon</p>
  </div>
</main>

<footer>
  <span>© 2026 ANCHOR DIGITAL LLC</span>
  <a href="https://github.com/hrweaver/anchor-legal/blob/main/PRIVACY.md">Privacy</a>
  <a href="https://github.com/hrweaver/anchor-legal/blob/main/TERMS.md">Terms</a>
  <a href="https://github.com/hrweaver/anchor-legal/blob/main/SUPPORT.md">Support</a>
  <a href="mailto:support@anchorph.one">support@anchorph.one</a>
</footer>

</body>
</html>
