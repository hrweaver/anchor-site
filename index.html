<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anchor</title>
<meta name="description" content="Anchor: accountability for your phone. On Google Play now. Coming soon to iPhone.">
<meta property="og:title" content="Anchor">
<meta property="og:description" content="Accountability for your phone.">
<meta property="og:url" content="https://anchorph.one">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600&family=Spline+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0B10; --surface:#15172270;
    --ink:#EDEFF7; --muted:#9FA5BE; --faint:#666D87;
    --accent:#7C8FE8; --accent-ink:#A9B5F6; --line:#23273A;
    --font-d:"Bricolage Grotesque",system-ui,sans-serif;
    --font-b:"Spline Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-b);
       min-height:100svh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
       text-align:center;padding:clamp(24px,5vw,48px) 20px;gap:0}
  .wordmark{height:clamp(30px,5vw,40px);display:block}
  video{width:min(360px,78vw);aspect-ratio:1;display:block;margin:clamp(4px,1.5vw,12px) 0;
        -webkit-mask-image:radial-gradient(circle,#000 55%,transparent 71%);
        mask-image:radial-gradient(circle,#000 55%,transparent 71%)}
  h1{font-family:var(--font-d);font-weight:600;font-size:clamp(1.5rem,3.4vw,2.1rem);
     letter-spacing:-.015em;line-height:1.15;margin:0;text-wrap:balance}
  .sub{color:var(--muted);font-size:clamp(.95rem,1.8vw,1.05rem);margin:12px 0 0;max-width:44ch}
  .ctas{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:9px;border-radius:12px;padding:13px 22px;
       font-weight:600;font-size:.96rem;text-decoration:none;transition:transform .15s}
  .btn:hover{transform:translateY(-1px)}
  .btn.primary{background:var(--accent);color:#0E1020}
  .btn.ghost{border:1px solid var(--line);color:var(--muted);background:var(--surface);cursor:default}
  .btn .tag{font-size:.66rem;font-weight:500;opacity:.75;display:block;line-height:1;text-align:left}
  footer{padding:20px;color:var(--faint);font-size:.8rem;display:flex;gap:16px;
         justify-content:center;flex-wrap:wrap}
  footer a{color:var(--faint);text-decoration:none}
  footer a:hover{color:var(--muted)}
  @media (prefers-reduced-motion:reduce){video{display:none}}
</style>
</head>
<body>

<main>
  <img class="wordmark" src="assets/wordmark.png" alt="Anchor">
  <video autoplay loop muted playsinline aria-hidden="true">
    <source src="assets/anchor-spin.mp4" type="video/mp4">
  </video>
  <h1>Accountability for your phone.</h1>
  <p class="sub">Block the apps that pull you in. Unlocking one takes your partner's approval, not your willpower.</p>
  <div class="ctas">
    <a class="btn primary" href="https://play.google.com/store/apps/details?id=com.anchorapp.focus">
      <span>▶</span><span><span class="tag">Available now on</span>Google Play</span>
    </a>
    <span class="btn ghost"><span><span class="tag">iPhone</span>Coming soon</span></span>
  </div>
</main>

<footer>
  <span>© 2026 ANCHOR DIGITAL LLC</span>
  <a href="https://github.com/hrweaver/anchor-legal/blob/main/PRIVACY.md">Privacy</a>
  <a href="https://github.com/hrweaver/anchor-legal/blob/main/TERMS.md">Terms</a>
  <a href="https://github.com/hrweaver/anchor-legal/blob/main/SUPPORT.md">Support</a>
  <a href="mailto:support@anchorph.one">support@anchorph.one</a>
</footer>

</body>
</html>
